<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AIA SafeFood Maze</title>
<link rel="stylesheet" href="estilo.css">
</head>

<body>

<img src="imagenes/logo/logo_aia_safefood_maze.png" id="logo">

<h1>AIA SafeFood Maze</h1>
<p class="autor">Creado por Osmari Cortés Bracho</p>

<div id="hud">
  <span id="tiempo">Tiempo: 0 s</span>
  <span id="vidas"></span>
</div>

<div id="panel" class="oculto">
  <h2 id="panelTitulo"></h2>
  <div id="panelTexto"></div>
  <div id="panelOpciones"></div>
  <input id="nombreJugador" placeholder="Nombre y Apellido" class="oculto">
  <div id="panelBotones"></div>
</div>

<canvas id="juego"></canvas>

<div id="controles">
<button onclick="moverJugador(0,-1)">⬆</button>

<div>
<button onclick="moverJugador(-1,0)">⬅</button>
<button onclick="moverJugador(1,0)">➡</button>
</div>

<button onclick="moverJugador(0,1)">⬇</button>
</div>


<!-- ARCHIVOS DEL JUEGO -->

<script src="datos/configuracion.js"></script>
<script src="datos/mapas.js"></script>
<script src="datos/tarjetas.js"></script>
<script src="datos/certificados.js"></script>

<script src="datos/preguntas.js"></script>
<script src="datos/niveles.js"></script>
<script src="datos/microorganismos.js"></script>

<script src="juego.js"></script>


</body>

</html>
